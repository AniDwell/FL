<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile | Artist Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { electric: '#0052FF', darkBg: '#000000', darkSurface: '#0a0a0a' } } } }
    </script>
    <script>document.documentElement.classList.add('dark');</script>

    <style>
        body { overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .profile-note {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; font-size: 11px; font-weight: 600; padding: 6px 12px;
            border-radius: 14px; white-space: nowrap; max-width: 100px;
            overflow: hidden; text-overflow: ellipsis; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 20;
        }
        .profile-note::after {
            content: ''; position: absolute; bottom: -5px; left: 10%;
            border-width: 5px 5px 0; border-style: solid;
            border-color: inherit; border-bottom-color: transparent !important; border-left-color: transparent !important; border-right-color: transparent !important;
        }
    </style>
</head>
<body class="bg-white text-gray-900 dark:bg-darkBg dark:text-gray-100 min-h-screen w-screen flex flex-col transition-colors duration-300 pb-20">

    <header class="sticky top-0 z-50 bg-white/90 dark:bg-black/90 backdrop-blur-md border-b border-gray-200 dark:border-white/10 px-4 py-3 flex justify-between items-center h-[60px]">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="active:scale-90 transition-transform">
                <svg class="w-6 h-6 text-gray-800 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 id="header-username" class="text-xl font-extrabold tracking-tight flex items-center gap-1">
                loading...
                <svg id="verified-badge" class="w-4 h-4 text-electric hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"></path></svg>
            </h1>
        </div>
        <button id="settings-btn" onclick="window.proAPI.triggerModule('settings')" class="active:scale-90 transition-transform hidden">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
    </header>

    <main class="flex-1 w-full max-w-lg mx-auto pt-6 flex flex-col relative z-10">
        
        <div class="flex items-center justify-between px-4">
            <div class="relative cursor-pointer active:scale-95 transition-transform shrink-0" onclick="window.proAPI.openPfpMenu()">
                <div id="profile-thought" class="profile-note hidden bg-white/10 border-white/20"></div>
                <div class="w-[84px] h-[84px] rounded-full p-[2px] border-[2px] border-gray-300 dark:border-white/20" id="pfp-ring">
                    <img id="profile-pfp" src="" class="w-full h-full rounded-full object-cover border-2 border-white dark:border-[#0a0a0a]">
                </div>
            </div>

            <div class="flex gap-6 text-center flex-1 justify-center ml-4">
                <div class="flex flex-col"><span id="stat-posts" class="font-extrabold text-lg">0</span><span class="text-[10px] opacity-70">Posts</span></div>
                <div class="flex flex-col"><span id="stat-followers" class="font-extrabold text-lg">0</span><span class="text-[10px] opacity-70">Followers</span></div>
                <div class="flex flex-col"><span id="stat-following" class="font-extrabold text-lg">0</span><span class="text-[10px] opacity-70">Following</span></div>
            </div>
        </div>

        <div class="px-4 mt-3">
            <h2 id="profile-name" class="font-bold text-sm"></h2>
            <p id="profile-bio" class="text-xs mt-1 leading-relaxed opacity-80 whitespace-pre-wrap"></p>
        </div>

        <div id="action-buttons-container" class="flex items-center gap-2 px-4 mt-5">
            <div class="w-full h-8 bg-gray-200 dark:bg-white/10 animate-pulse rounded-lg"></div>
        </div>

        <div class="w-full h-[1px] bg-gray-200 dark:bg-white/10 mt-5"></div>

        <div id="highlight-widget" class="w-full mt-2"></div>
        <div id="categopost-widget" class="w-full mt-2 sticky top-[60px] z-40 bg-white dark:bg-black"></div>
        <div id="posts-widget" class="w-full flex-1 min-h-[300px]"></div>

    </main>

    <div id="bottom-nav-container"></div>

    <div id="modal-pfp-menu" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] hidden flex-col items-center justify-center px-8 transition-opacity duration-300 opacity-0" onclick="window.proAPI.closeModal('modal-pfp-menu', 'pfp-menu-card')">
        <div id="pfp-menu-card" class="bg-white dark:bg-[#111] border border-gray-200 dark:border-white/10 w-full rounded-[20px] shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col overflow-hidden" onclick="event.stopPropagation()">
            <button onclick="window.proAPI.viewStory()" class="w-full px-4 py-4 text-center font-bold border-b border-gray-100 dark:border-white/10 hover:bg-white/5 active:bg-white/10 transition-colors">View Story</button>
            <button onclick="window.proAPI.viewFullPfp()" class="w-full px-4 py-4 text-center font-bold hover:bg-white/5 active:bg-white/10 transition-colors">View Profile Picture</button>
        </div>
    </div>

    <div id="modal-full-pfp" class="fixed inset-0 bg-black/95 z-[300] hidden flex-col items-center justify-center transition-opacity duration-300 opacity-0" onclick="window.proAPI.closeModal('modal-full-pfp', 'full-pfp-img')">
        <button class="absolute top-6 left-4 p-2 text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        <img id="full-pfp-img" src="" class="w-full max-w-md object-contain transform scale-95 transition-transform duration-300">
    </div>

    <div id="modal-share" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] hidden flex-col justify-end px-4 pb-6 transition-opacity duration-300 opacity-0" onclick="window.proAPI.closeModal('modal-share', 'share-card')">
        <div id="share-card" class="bg-white dark:bg-[#111] border border-gray-200 dark:border-white/10 w-full max-w-md mx-auto rounded-[24px] p-6 shadow-2xl transform translate-y-full transition-transform duration-300 flex flex-col items-center relative" onclick="event.stopPropagation()">
            <button onclick="window.proAPI.closeModal('modal-share', 'share-card')" class="absolute top-4 right-4 p-2 text-gray-400 hover:text-black dark:hover:text-white transition-colors bg-gray-100 dark:bg-white/10 rounded-full">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <h3 class="text-lg font-bold mb-6">Share Profile</h3>
            
            <div id="qr-container" class="w-40 h-40 bg-white p-3 rounded-2xl shadow-sm mb-6 relative">
                <svg class="w-full h-full text-black" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm13-2h-3v2h3v-2zm-3 4h3v2h-3v-2zm-2-2h-2v2h2v-2zm-2-2h2v2h-2v-2zm0 4h2v2h-2v-2zm4 2h2v2h-2v-2zm2-6h2v2h-2v-2z"/>
                </svg>
                <div class="absolute inset-0 flex items-center justify-center">
                    <img id="qr-center-pfp" src="" class="w-8 h-8 rounded-full border-2 border-white object-cover hidden">
                </div>
            </div>

            <div class="flex gap-4 mb-6 w-full justify-center overflow-x-auto hide-scrollbar px-2">
                <button onclick="alert('Opening WhatsApp...')" class="w-12 h-12 rounded-full bg-green-500/10 text-green-500 flex items-center justify-center shrink-0 active:scale-95 transition-transform"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.099.824z"/></svg></button>
                <button onclick="alert('Opening Twitter/X...')" class="w-12 h-12 rounded-full bg-gray-200 dark:bg-white/10 text-gray-900 dark:text-white flex items-center justify-center shrink-0 active:scale-95 transition-transform"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></button>
                <button onclick="alert('Opening Telegram...')" class="w-12 h-12 rounded-full bg-blue-500/10 text-blue-500 flex items-center justify-center shrink-0 active:scale-95 transition-transform"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 000 12a12 12 0 0012 12 12 12 0 0012-12A12 12 0 0012 0a12 12 0 00-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 01.171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg></button>
            </div>

            <div class="flex gap-3 w-full">
                <button onclick="window.proAPI.copyLink()" class="flex-1 bg-gray-100 dark:bg-white/5 hover:bg-gray-200 dark:hover:bg-white/10 py-3 rounded-xl text-sm font-bold transition-colors flex items-center justify-center gap-2">
                    <svg class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                    Copy Link
                </button>
                <button onclick="window.proAPI.downloadQR()" class="flex-1 bg-electric hover:bg-blue-600 py-3 rounded-xl text-white text-sm font-bold transition-colors shadow-lg shadow-electric/20 flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Download
                </button>
            </div>
        </div>
    </div>

    <div id="modal-user-options" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] hidden flex-col justify-end px-4 pb-6 transition-opacity duration-300 opacity-0" onclick="window.proAPI.closeModal('modal-user-options', 'user-options-card')">
        <div id="user-options-card" class="bg-white dark:bg-[#111] border border-gray-200 dark:border-white/10 w-full max-w-md mx-auto rounded-[24px] p-2 shadow-2xl transform translate-y-full transition-transform duration-300 flex flex-col gap-1" onclick="event.stopPropagation()">
            <div class="w-12 h-1 bg-gray-300 dark:bg-white/20 rounded-full mx-auto my-2 mb-2"></div>
            
            <div class="p-2 flex flex-col gap-1">
                <button onclick="window.proAPI.triggerModule('favusr')" class="w-full flex items-center gap-3 px-4 py-3.5 hover:bg-white/5 rounded-xl transition-colors text-sm font-bold">
                    <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
                    <span>Add to Favorites</span>
                </button>
                <button onclick="window.proAPI.triggerModule('mute')" class="w-full flex items-center gap-3 px-4 py-3.5 hover:bg-white/5 rounded-xl transition-colors text-sm font-bold">
                    <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path></svg>
                    <span>Mute</span>
                </button>
                <button onclick="window.proAPI.triggerAction('unfollow')" class="w-full flex items-center gap-3 px-4 py-3.5 hover:bg-red-500/10 rounded-xl transition-colors text-sm font-bold text-red-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7a4 4 0 11-8 0 4 4 0 018 0zM9 14a6 6 0 00-6 6v1h12v-1a6 6 0 00-6-6zM21 12h-6"></path></svg>
                    <span>Unfollow</span>
                </button>
                <button onclick="window.proAPI.triggerModule('blc')" class="w-full flex items-center gap-3 px-4 py-3.5 hover:bg-red-500/10 rounded-xl transition-colors text-sm font-bold text-red-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
                    <span>Block User</span>
                </button>
            </div>
        </div>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyCANvRaHEUA7wkWMhC9_hFyrzU8cjoUo2U",
            authDomain: "thuggish-2cd07.firebaseapp.com",
            projectId: "thuggish-2cd07"
        });
        const auth = getAuth(app);
        const db = getFirestore(app);

        const pfpPlaceholder = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='gray'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>`;

        let targetUid = null;
        let isMe = false;
        let userData = {};

        const urlParams = new URLSearchParams(window.location.search);
        const queryId = urlParams.get('id');

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            
            targetUid = queryId || user.uid;
            isMe = (targetUid === user.uid);

            try {
                const userDoc = await getDoc(doc(db, "users", targetUid));
                userData = userDoc.exists() ? userDoc.data() : null;

                if (!userData) {
                    document.getElementById('header-username').innerText = "User not found";
                    return;
                }

                document.getElementById('header-username').innerHTML = `${userData.username} ${userData.isVerified ? '<svg class="w-4 h-4 text-electric inline-block" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"></path></svg>' : ''}`;
                document.getElementById('profile-name').innerText = userData.displayName || '';
                document.getElementById('profile-bio').innerText = userData.bio || '';
                
                const pfpUrl = userData.photoURL || pfpPlaceholder;
                document.getElementById('profile-pfp').src = pfpUrl;
                document.getElementById('full-pfp-img').src = pfpUrl;
                document.getElementById('qr-center-pfp').src = pfpUrl;
                document.getElementById('qr-center-pfp').classList.remove('hidden');

                document.getElementById('stat-posts').innerText = userData.postsCount || 0;
                document.getElementById('stat-followers').innerText = userData.followersCount || 0;
                document.getElementById('stat-following').innerText = userData.followingCount || 0;

                const thoughtDoc = await getDoc(doc(db, "thoughts", targetUid));
                if (thoughtDoc.exists()) {
                    const tData = thoughtDoc.data();
                    const noteEl = document.getElementById('profile-thought');
                    noteEl.innerText = tData.text;
                    if(tData.bgColor) {
                        noteEl.style.backgroundColor = tData.bgColor;
                        noteEl.style.borderColor = tData.bgColor;
                    }
                    noteEl.classList.remove('hidden');
                }

                const btnContainer = document.getElementById('action-buttons-container');
                if (isMe) {
                    document.getElementById('settings-btn').classList.remove('hidden');
                    btnContainer.innerHTML = `
                        <button onclick="window.proAPI.triggerModule('edit')" class="flex-1 bg-gray-200 dark:bg-white/10 hover:bg-gray-300 dark:hover:bg-white/20 py-1.5 rounded-lg text-sm font-bold transition-colors">Edit profile</button>
                        <button onclick="window.proAPI.openShareModal()" class="flex-1 bg-gray-200 dark:bg-white/10 hover:bg-gray-300 dark:hover:bg-white/20 py-1.5 rounded-lg text-sm font-bold transition-colors">Share profile</button>
                    `;
                } else {
                    btnContainer.innerHTML = `
                        <button onclick="window.proAPI.triggerAction('follow')" class="flex-1 bg-electric hover:bg-blue-600 py-1.5 rounded-lg text-white text-sm font-bold transition-colors">Follow</button>
                        <button onclick="window.location.href='vchat.html?id=${targetUid}'" class="flex-1 bg-gray-200 dark:bg-white/10 hover:bg-gray-300 dark:hover:bg-white/20 py-1.5 rounded-lg text-sm font-bold transition-colors">Message</button>
                        <button onclick="window.proAPI.openUserOptions()" class="w-8 h-8 flex items-center justify-center bg-gray-200 dark:bg-white/10 hover:bg-gray-300 dark:hover:bg-white/20 rounded-lg transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path></svg>
                        </button>
                    `;
                }

                loadWidgets();
                if(isMe) loadBottomNav();

            } catch (error) {
                console.error("Error loading profile:", error);
            }
        });


        // --- GLOBAL API ---
        window.proAPI = {
            openPfpMenu: () => {
                const m = document.getElementById('modal-pfp-menu'); const c = document.getElementById('pfp-menu-card');
                m.classList.remove('hidden'); m.classList.add('flex');
                requestAnimationFrame(() => { m.classList.remove('opacity-0'); m.classList.add('opacity-100'); c.classList.remove('scale-95'); c.classList.add('scale-100'); });
            },
            openUserOptions: () => {
                const m = document.getElementById('modal-user-options'); const c = document.getElementById('user-options-card');
                m.classList.remove('hidden'); m.classList.add('flex');
                requestAnimationFrame(() => { m.classList.remove('opacity-0'); m.classList.add('opacity-100'); c.classList.remove('translate-y-full'); c.classList.add('translate-y-0'); });
            },
            openShareModal: () => {
                const m = document.getElementById('modal-share'); const c = document.getElementById('share-card');
                m.classList.remove('hidden'); m.classList.add('flex');
                requestAnimationFrame(() => { m.classList.remove('opacity-0'); m.classList.add('opacity-100'); c.classList.remove('translate-y-full'); c.classList.add('translate-y-0'); });
            },
            closeModal: (modalId, cardId) => {
                const m = document.getElementById(modalId); const c = document.getElementById(cardId);
                m.classList.remove('opacity-100'); m.classList.add('opacity-0'); 
                if(c.id.includes('options') || c.id.includes('share')) { c.classList.remove('translate-y-0'); c.classList.add('translate-y-full'); }
                else { c.classList.remove('scale-100'); c.classList.add('scale-95'); }
                setTimeout(() => { m.classList.remove('flex'); m.classList.add('hidden'); }, 300);
            },
            
            viewStory: async () => {
                window.proAPI.closeModal('modal-pfp-menu', 'pfp-menu-card');
                try {
                    const playerModule = await import('./plyrstry.js');
                    if (playerModule && playerModule.playStory) { playerModule.playStory(targetUid); }
                } catch (e) { alert("User has no active story or plyrstry.js missing."); }
            },
            viewFullPfp: () => {
                window.proAPI.closeModal('modal-pfp-menu', 'pfp-menu-card');
                const m = document.getElementById('modal-full-pfp'); const img = document.getElementById('full-pfp-img');
                m.classList.remove('hidden'); m.classList.add('flex');
                requestAnimationFrame(() => { m.classList.remove('opacity-0'); m.classList.add('opacity-100'); img.classList.remove('scale-95'); img.classList.add('scale-100'); });
            },

            // Share Functions
            copyLink: () => {
                const link = `${window.location.origin}/pro.html?id=${targetUid}`;
                navigator.clipboard.writeText(link).then(() => {
                    alert("Profile link copied to clipboard!");
                    window.proAPI.closeModal('modal-share', 'share-card');
                }).catch(err => alert("Failed to copy link"));
            },
            downloadQR: () => {
                alert("QR Code downloading...");
                window.proAPI.closeModal('modal-share', 'share-card');
            },

            // Dynamic Module Loader (Settings, Edit, Fav, Block, Mute)
            triggerModule: async (moduleName) => {
                window.proAPI.closeModal('modal-user-options', 'user-options-card');
                try {
                    const mod = await import(`./${moduleName}.js`);
                    if (mod && mod.init) mod.init(targetUid);
                    else alert(`Module logic executed: ${moduleName}.js`);
                } catch (e) {
                    console.warn(e);
                    alert(`Placeholder: Intended to open ${moduleName}.js`);
                }
            },
            triggerAction: (action) => {
                window.proAPI.closeModal('modal-user-options', 'user-options-card');
                if(action === 'follow') alert(`Follow request sent to ${targetUid}`);
                if(action === 'unfollow') { if(confirm("Are you sure you want to unfollow?")) alert("Unfollowed"); }
            }
        };

        // --- WIDGET LOADERS ---
        async function loadBottomNav() {
            try {
                const navModule = await import('./bottom-nav.js');
                if (navModule && navModule.initBottomNav) navModule.initBottomNav('bottom-nav-container');
            } catch (error) {}
        }

        const widgetConfig = [
            { id: 'highlight-widget', file: './highlight.js', func: 'loadHighlights' },
            { id: 'categopost-widget', file: './categopost.js', func: 'loadPostCategories' },
            { id: 'posts-widget', file: './posts.js', func: 'loadPosts' }
        ];

        const createSpinner = (id) => {
            document.getElementById(id).innerHTML = `<div class="w-full py-8 flex justify-center opacity-40"><div class="w-5 h-5 border-2 border-gray-500 border-t-white rounded-full animate-spin"></div></div>`;
        };

        async function loadWidgets() {
            for (const widget of widgetConfig) {
                try {
                    const module = await import(widget.file);
                    if (module && module[widget.func]) module[widget.func](widget.id, targetUid);
                } catch (error) {
                    createSpinner(widget.id); 
                }
            }
        }
    </script>
</body>
</html>
