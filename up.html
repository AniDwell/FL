<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create | Artist Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { electric: '#0052FF' } } }
        }
    </script>
    <script>document.documentElement.classList.add('dark');</script>

    <style>
        body { overflow: hidden; background: #000; touch-action: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        #editor-canvas { touch-action: none; transform-origin: center center; }
        
        /* Category Slider Active State */
        .cat-active { color: white; font-weight: bold; transform: scale(1.1); transition: all 0.2s; }
        .cat-inactive { color: rgba(255,255,255,0.5); transition: all 0.2s; }

        .draggable { position: absolute; pointer-events: auto; z-index: 50; }
        .filter-btn { border: 2px solid transparent; transition: all 0.2s; }
        .filter-active { border-color: white; transform: scale(1.05); }
    </style>
</head>
<body class="text-white w-screen h-screen flex flex-col relative font-sans select-none">

    <div class="absolute top-0 left-0 w-full p-6 flex justify-between items-center z-50 pointer-events-auto">
        <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center bg-black/40 backdrop-blur-md rounded-full active:scale-90 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <button onclick="processAndUpload()" id="upload-btn" class="bg-electric text-white px-5 py-2 rounded-full text-sm font-bold active:scale-95 transition-transform hidden shadow-[0_0_15px_rgba(0,82,255,0.5)]">
            Share
        </button>
    </div>

    <div class="absolute top-24 right-4 flex flex-col gap-5 z-50 pointer-events-auto hidden" id="edit-tools">
        <button onclick="addTextOverlay()" class="w-10 h-10 bg-black/50 backdrop-blur-md rounded-full flex items-center justify-center border border-white/20 active:scale-90 transition-transform">
            <span class="font-serif font-bold text-lg">Aa</span>
        </button>
        <button onclick="toggleGifModal()" class="w-10 h-10 bg-black/50 backdrop-blur-md rounded-full flex items-center justify-center border border-white/20 active:scale-90 transition-transform font-black text-[10px]">
            GIF
        </button>
        <button onclick="toggleFilters()" class="w-10 h-10 bg-black/50 backdrop-blur-md rounded-full flex items-center justify-center border border-white/20 active:scale-90 transition-transform">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
        </button>
    </div>

    <div id="editor-canvas" class="w-full h-full bg-[#111] relative overflow-hidden flex items-center justify-center">
        <video id="camera-feed" class="absolute inset-0 w-full h-full object-cover" autoplay muted playsinline></video>
        
        <img id="media-layer" class="absolute inset-0 w-full h-full object-cover hidden transition-all duration-200">
        <video id="video-layer" class="absolute inset-0 w-full h-full object-cover hidden transition-all duration-200" loop muted playsinline></video>
        
        <div id="overlay-container" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
    </div>

    <div id="bottom-controls" class="absolute bottom-0 w-full flex flex-col items-center z-40 bg-gradient-to-t from-black via-black/80 to-transparent pb-8 pt-10 pointer-events-auto">
        
        <div class="w-full overflow-x-auto hide-scrollbar mb-6 px-1/2 flex justify-center gap-8 text-sm uppercase tracking-wider" id="category-slider">
            <button class="cat-active" onclick="setCategory('story', this)">Story</button>
            <button class="cat-inactive" onclick="setCategory('vids', this)">Vids</button>
            <button class="cat-inactive" onclick="setCategory('post', this)">Post</button>
            <button class="cat-inactive" onclick="setCategory('reference', this)">Reference</button>
        </div>

        <div class="flex items-center justify-between w-full px-10">
            <button onclick="document.getElementById('file-picker').click()" class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur-md border border-white/30 flex items-center justify-center overflow-hidden active:scale-95 transition-all">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </button>
            <input type="file" id="file-picker" accept="image/*,video/*" class="hidden" onchange="loadMedia(event)">

            <button id="capture-btn" onclick="capturePhoto()" class="w-16 h-16 rounded-full border-[4px] border-white flex items-center justify-center p-1 active:scale-90 transition-transform">
                <div class="w-full h-full bg-white rounded-full"></div>
            </button>

            <button class="w-10 h-10 rounded-full bg-black/40 flex items-center justify-center active:scale-90 transition-all">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>
    </div>

    <div id="filter-panel" class="absolute bottom-24 left-0 w-full overflow-x-auto hide-scrollbar px-4 py-4 flex gap-4 bg-black/60 backdrop-blur-lg border-t border-white/10 hidden z-50">
        <div class="flex flex-col items-center gap-1 cursor-pointer shrink-0" onclick="applyFilter('none', this)"><div class="w-14 h-14 rounded-full bg-gray-500 filter-btn filter-active"></div><span class="text-[10px]">Normal</span></div>
        <div class="flex flex-col items-center gap-1 cursor-pointer shrink-0" onclick="applyFilter('sepia(0.5) contrast(1.2)', this)"><div class="w-14 h-14 rounded-full bg-[#D4A373] filter-btn"></div><span class="text-[10px]">Cinematic</span></div>
        <div class="flex flex-col items-center gap-1 cursor-pointer shrink-0" onclick="applyFilter('grayscale(1) contrast(1.5)', this)"><div class="w-14 h-14 rounded-full bg-gray-800 filter-btn"></div><span class="text-[10px]">B&W</span></div>
        <div class="flex flex-col items-center gap-1 cursor-pointer shrink-0" onclick="applyFilter('saturate(1.5) contrast(1.1)', this)"><div class="w-14 h-14 rounded-full bg-blue-400 filter-btn"></div><span class="text-[10px]">Vibrant</span></div>
        <div class="flex flex-col items-center gap-1 cursor-pointer shrink-0" onclick="applyFilter('hue-rotate(90deg) saturate(1.2)', this)"><div class="w-14 h-14 rounded-full bg-green-400 filter-btn"></div><span class="text-[10px]">Cyber</span></div>
    </div>

    <div id="gif-modal" class="fixed inset-0 bg-black/90 z-[100] hidden flex-col px-4 pt-10 pb-4">
        <div class="flex gap-2 mb-4">
            <input type="text" id="gif-search" placeholder="Search Tenor GIFs..." class="flex-1 bg-white/10 rounded-xl px-4 py-3 outline-none text-white text-sm" onkeypress="if(event.key === 'Enter') searchGIFs()">
            <button onclick="toggleGifModal()" class="text-white px-4 font-bold opacity-60">Cancel</button>
        </div>
        <div id="gif-results" class="flex-1 overflow-y-auto grid grid-cols-2 gap-2 hide-scrollbar"></div>
    </div>

    <div id="upload-loader" class="fixed inset-0 bg-black/95 z-[120] hidden flex-col items-center justify-center">
        <div class="w-12 h-12 border-[4px] border-white/20 border-t-electric rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-bold tracking-widest uppercase opacity-70">Uploading to Server...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyCANvRaHEUA7wkWMhC9_hFyrzU8cjoUo2U",
            authDomain: "thuggish-2cd07.firebaseapp.com",
            projectId: "thuggish-2cd07"
        });
        const auth = getAuth(app);
        const db = getFirestore(app);

        // API KEYS
        const IMGBB_API = "4a683051e76ed12880a42aefa6ed427b";
        const TENOR_API = "YOUR_TENOR_API_KEY"; // Replace with your Tenor API Key
        
        let currentUser = null;
        let selectedFileBlob = null;
        let isVideo = false;
        let currentCategory = 'story'; 
        let appliedFilter = 'none';
        
        onAuthStateChanged(auth, user => { if(user) currentUser = user; });

        // --- CAMERA INITIALIZATION ---
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                document.getElementById('camera-feed').srcObject = stream;
            } catch (err) {
                console.warn("Camera access denied or unavailable.");
            }
        }
        window.addEventListener('DOMContentLoaded', initCamera);

        // --- CATEGORY SELECTOR ---
        window.setCategory = (cat, btn) => {
            currentCategory = cat;
            document.querySelectorAll('#category-slider button').forEach(b => {
                b.className = 'cat-inactive';
            });
            btn.className = 'cat-active';
        };

        // Check URL for default category (from stories.js)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('type')) {
            const type = urlParams.get('type');
            const btns = document.querySelectorAll('#category-slider button');
            btns.forEach(b => { if(b.innerText.toLowerCase() === type) setCategory(type, b); });
        }

        // --- PINCH TO ZOOM LOGIC ---
        let currentScale = 1;
        let initialDistance = 0;
        const canvas = document.getElementById('editor-canvas');
        const mediaLayer = document.getElementById('media-layer');
        const videoLayer = document.getElementById('video-layer');

        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            }
        });
        canvas.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                const newDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                let scale = currentScale * (newDist / initialDistance);
                scale = Math.min(Math.max(1, scale), 3); // Limit zoom 1x to 3x
                mediaLayer.style.transform = `scale(${scale})`;
                videoLayer.style.transform = `scale(${scale})`;
            }
        });
        canvas.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
                const active = isVideo ? videoLayer : mediaLayer;
                currentScale = parseFloat(active.style.transform.replace('scale(', '').replace(')', '')) || 1;
                initialDistance = 0;
            }
        });

        // --- MEDIA LOADING (Gallery or Capture) ---
        function setMediaReady() {
            document.getElementById('camera-feed').style.display = 'none';
            document.getElementById('bottom-controls').style.display = 'none';
            document.getElementById('edit-tools').classList.remove('hidden');
            document.getElementById('upload-btn').classList.remove('hidden');
        }

        window.loadMedia = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            selectedFileBlob = file;
            isVideo = file.type.startsWith('video');
            
            const url = URL.createObjectURL(file);
            if (isVideo) {
                videoLayer.src = url;
                videoLayer.style.display = 'block';
                videoLayer.play();
            } else {
                mediaLayer.src = url;
                mediaLayer.style.display = 'block';
            }
            setMediaReady();
        };

        window.capturePhoto = () => {
            const video = document.getElementById('camera-feed');
            const c = document.createElement('canvas');
            c.width = video.videoWidth; c.height = video.videoHeight;
            c.getContext('2d').drawImage(video, 0, 0, c.width, c.height);
            c.toBlob((blob) => {
                selectedFileBlob = new File([blob], "capture.jpg", { type: "image/jpeg" });
                mediaLayer.src = URL.createObjectURL(blob);
                mediaLayer.style.display = 'block';
                isVideo = false;
                setMediaReady();
            }, 'image/jpeg', 0.9);
        };

        // --- FILTERS (Freepik style presets) ---
        window.toggleFilters = () => {
            const panel = document.getElementById('filter-panel');
            panel.classList.toggle('hidden');
        };

        window.applyFilter = (filterString, btnEl) => {
            appliedFilter = filterString;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('filter-active'));
            btnEl.querySelector('.filter-btn').classList.add('filter-active');
            
            const active = isVideo ? videoLayer : mediaLayer;
            active.style.filter = filterString;
        };

        // --- DRAGGABLE OVERLAYS (Text & GIF) ---
        function makeDraggable(el) {
            let isDragging = false;
            el.addEventListener('touchstart', () => isDragging = true);
            el.addEventListener('touchend', () => isDragging = false);
            document.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    const t = e.touches[0];
                    el.style.left = t.clientX + 'px';
                    el.style.top = t.clientY + 'px';
                }
            });
            document.getElementById('overlay-container').appendChild(el);
        }

        window.addTextOverlay = () => {
            const text = prompt("Enter text:");
            if (!text) return;
            const div = document.createElement('div');
            div.className = "draggable text-3xl font-bold text-white px-2 drop-shadow-lg";
            div.style.left = "50%"; div.style.top = "50%"; div.style.transform = "translate(-50%, -50%)";
            div.innerText = text;
            makeDraggable(div);
        };

        // --- TENOR GIF INTEGRATION ---
        window.toggleGifModal = () => { document.getElementById('gif-modal').classList.toggle('hidden'); };
        
        window.searchGIFs = async () => {
            const q = document.getElementById('gif-search').value;
            if(!q) return;
            // Note: Replace TENOR_API with real key or it will fail.
            try {
                const res = await fetch(`https://tenor.googleapis.com/v2/search?q=${q}&key=${TENOR_API}&limit=10`);
                const data = await res.json();
                const container = document.getElementById('gif-results');
                container.innerHTML = '';
                data.results.forEach(gif => {
                    const img = document.createElement('img');
                    img.src = gif.media_formats.tinygif.url;
                    img.className = "w-full rounded-xl cursor-pointer";
                    img.onclick = () => {
                        const gifEl = document.createElement('img');
                        gifEl.src = img.src;
                        gifEl.className = "draggable w-32 drop-shadow-lg";
                        gifEl.style.left = "50%"; gifEl.style.top = "50%"; gifEl.style.transform = "translate(-50%, -50%)";
                        makeDraggable(gifEl);
                        toggleGifModal();
                    };
                    container.appendChild(img);
                });
            } catch(e) { alert("Add Tenor API key in the code to fetch GIFs!"); }
        };

        // --- UPLOAD LOGIC ---
        window.processAndUpload = async () => {
            if (!selectedFileBlob || !currentUser) return;
            document.getElementById('upload-loader').classList.remove('hidden');
            document.getElementById('upload-loader').classList.add('flex');

            try {
                let finalMediaUrl = "";

                if (isVideo) {
                    // Video -> Send to HF / Strmpup Bot
                    await new Promise(r => setTimeout(r, 2000)); // Simulating processing
                    finalMediaUrl = `https://anidwell-footprints.hf.space/stream/38156588?hash=54b5cf21302adf2b320d1250d9f85637`;
                } else {
                    // Image -> Send to ImgBB
                    const formData = new FormData();
                    formData.append("image", selectedFileBlob);
                    formData.append("key", IMGBB_API);
                    const response = await fetch("https://api.imgbb.com/1/upload", { method: "POST", body: formData });
                    const imgData = await response.json();
                    if (imgData.success) {
                        finalMediaUrl = imgData.data.url;
                    } else throw new Error("ImgBB Failed");
                }

                // Gather Metadata
                const overlayHTML = document.getElementById('overlay-container').innerHTML;
                
                // Save to Firebase
                const targetCollection = currentCategory === 'story' ? 'stories' : 'posts';
                const newDocRef = doc(collection(db, targetCollection));
                
                await setDoc(newDocRef, {
                    authorUid: currentUser.uid,
                    category: currentCategory,
                    mediaUrl: finalMediaUrl,
                    mediaType: isVideo ? 'video' : 'image',
                    filter: appliedFilter,
                    scale: currentScale,
                    overlays: overlayHTML, // Saves the exact position of text and GIFs!
                    timestamp: serverTimestamp(),
                    isViewed: false
                });

                window.location.replace('home.html');

            } catch (error) {
                console.error("Upload Error:", error);
                alert("Upload failed.");
                document.getElementById('upload-loader').classList.add('hidden');
            }
        };
    </script>
</body>
</html>
