<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Complete Profile | Artist Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        electric: '#0052FF',
                        darkBg: '#000000',
                        darkSurface: '#0a0a0a'
                    }
                }
            }
        }
    </script>

    <script>
        const theme = localStorage.getItem('theme_preference') || 'system';
        if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>

    <style>
        .layer-hidden { opacity: 0; pointer-events: none; transform: scale(0.97); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: absolute; }
        .layer-visible { opacity: 1; pointer-events: auto; transform: scale(1); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 10; }
        body { overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .custom-input {
            width: 100%;
            background: transparent;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            outline: none;
            transition: all 0.2s;
        }
        .dark .custom-input {
            border-color: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .custom-input:focus { border-color: #0052FF; }
        .dark .custom-input:focus { border-color: white; }
    </style>
</head>
<body class="bg-white text-gray-900 dark:bg-darkBg dark:text-gray-100 min-h-screen w-screen flex flex-col items-center justify-center transition-colors duration-300 relative px-6">

    <div id="loading-overlay" class="fixed inset-0 bg-white/80 dark:bg-black/80 backdrop-blur-sm flex items-center justify-center z-[70] transition-opacity duration-300">
        <div class="flex flex-col items-center">
            <div class="w-8 h-8 border-[3px] border-gray-200 dark:border-white/10 border-t-electric dark:border-t-white rounded-full animate-spin mb-4"></div>
            <p id="loading-text" class="text-[10px] tracking-widest uppercase opacity-50 font-bold">Loading Profile...</p>
        </div>
    </div>

    <div class="w-full max-w-sm relative flex justify-center mt-8 mb-8">

        <div id="view-edit" class="layer-visible w-full flex flex-col items-center">
            <img src="logo.png" alt="Artist Hub" class="w-16 h-16 object-contain mb-6 brightness-0 dark:invert" onerror="this.style.display='none'">
            <h2 class="text-2xl font-bold mb-1 tracking-tight">Complete Profile</h2>
            <p class="text-xs opacity-50 mb-8 text-center">Set up your identity before entering Artist Hub.</p>

            <form id="profile-form" class="w-full flex flex-col items-center" onsubmit="event.preventDefault(); handleSaveProfile();">
                
                <div class="relative mb-6 cursor-pointer group" onclick="document.getElementById('pfp-upload').click()">
                    <div id="pfp-preview" class="w-24 h-24 rounded-full bg-gray-100 dark:bg-darkSurface border border-gray-200 dark:border-white/10 flex items-center justify-center overflow-hidden bg-cover bg-center transition-all group-hover:border-electric dark:group-hover:border-white">
                        <svg id="pfp-icon" class="w-8 h-8 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <div class="absolute bottom-0 right-0 bg-electric dark:bg-white text-white dark:text-black p-1.5 rounded-full shadow-lg">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                    </div>
                </div>
                <input type="file" id="pfp-upload" accept="image/*" class="hidden" onchange="previewPFP(event)">

                <div class="w-full space-y-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold tracking-wider opacity-50 ml-1 mb-1 block">Unique Username</label>
                        <input type="text" id="edit-username" placeholder="e.g. anime_artist99" class="custom-input lowercase" required pattern="^[a-z0-9_]+$" title="Lowercase letters, numbers, and underscores only.">
                    </div>
                    
                    <div>
                        <label class="text-[10px] uppercase font-bold tracking-wider opacity-50 ml-1 mb-1 block">Display Name</label>
                        <input type="text" id="edit-displayname" placeholder="Your Name" class="custom-input" required>
                    </div>
                    
                    <button type="submit" class="w-full bg-electric dark:bg-white hover:opacity-90 text-white dark:text-black text-sm font-bold py-3.5 rounded-xl transition-all active:scale-95 mt-6 shadow-lg shadow-electric/20 dark:shadow-none">Continue to App</button>
                </div>
            </form>
        </div>
    </div>

    <div id="alert-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-[80] transition-opacity duration-300 opacity-0">
        <div id="alert-card" class="bg-white dark:bg-darkSurface p-6 rounded-[20px] max-w-[280px] w-full mx-4 border border-gray-100 dark:border-white/10 transform scale-95 transition-transform duration-300 flex flex-col items-center text-center shadow-sm dark:shadow-none">
            <div id="alert-icon-container" class="w-12 h-12 rounded-full flex items-center justify-center mb-4">
                </div>
            <h3 id="alert-title" class="text-lg font-bold mb-1 tracking-tight text-gray-900 dark:text-white">Alert</h3>
            <p id="alert-message" class="text-xs text-gray-500 dark:text-gray-400 mb-6">Message goes here.</p>
            <button onclick="closeAlert()" class="w-full bg-gray-900 dark:bg-white hover:opacity-90 text-white dark:text-black text-sm font-bold py-3 px-4 rounded-xl transition-all">Okay</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCANvRaHEUA7wkWMhC9_hFyrzU8cjoUo2U",
            authDomain: "thuggish-2cd07.firebaseapp.com",
            projectId: "thuggish-2cd07",
            storageBucket: "thuggish-2cd07.firebasestorage.app",
            messagingSenderId: "221865053567",
            appId: "1:221865053567:web:ad8960c0136ac524269e4a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const IMGBB_API_KEY = "4a683051e76ed12880a42aefa6ed427b";
        
        let currentUser = null;
        let selectedPfpFile = null;
        let originalUsername = ""; // To track if they changed their username
        let currentPhotoURL = "";

        // --- UI HELPERS ---

        window.previewPFP = (event) => {
            const file = event.target.files[0];
            if (file) {
                selectedPfpFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const previewDiv = document.getElementById('pfp-preview');
                    previewDiv.style.backgroundImage = `url(${e.target.result})`;
                    document.getElementById('pfp-icon').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        };

        const showLoading = (text) => {
            document.getElementById('loading-text').innerText = text;
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('hidden'); overlay.classList.add('flex');
            requestAnimationFrame(() => {
                overlay.classList.remove('opacity-0'); overlay.classList.add('opacity-100');
            });
        };

        const hideLoading = () => {
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('opacity-100'); overlay.classList.add('opacity-0');
            setTimeout(() => { overlay.classList.remove('flex'); overlay.classList.add('hidden'); }, 300);
        };

        const showAlert = (title, message, isError = true) => {
            hideLoading();
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-message').innerText = message;
            
            const iconContainer = document.getElementById('alert-icon-container');
            if (isError) {
                iconContainer.className = "w-12 h-12 bg-red-50 dark:bg-red-500/10 rounded-full flex items-center justify-center mb-4";
                iconContainer.innerHTML = `<svg class="w-6 h-6 text-red-500 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            } else {
                iconContainer.className = "w-12 h-12 bg-green-50 dark:bg-green-500/10 rounded-full flex items-center justify-center mb-4";
                iconContainer.innerHTML = `<svg class="w-6 h-6 text-green-500 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            }

            const modal = document.getElementById('alert-modal');
            const card = document.getElementById('alert-card');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0'); modal.classList.add('opacity-100');
                card.classList.remove('scale-95'); card.classList.add('scale-100');
            });
        };

        window.closeAlert = () => {
            const modal = document.getElementById('alert-modal');
            const card = document.getElementById('alert-card');
            modal.classList.remove('opacity-100'); modal.classList.add('opacity-0');
            card.classList.remove('scale-100'); card.classList.add('scale-95');
            setTimeout(() => { modal.classList.remove('flex'); modal.classList.add('hidden'); }, 300);
        };

        // --- AUTH STATE & DATA FETCHING ---

        // Listen for Auth State to load user data automatically
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                try {
                    // Fetch existing data from Firestore
                    const userDocRef = doc(db, "users", user.uid);
                    const userDoc = await getDoc(userDocRef);

                    if (userDoc.exists()) {
                        const data = userDoc.data();
                        
                        // Populate Fields
                        document.getElementById('edit-username').value = data.username || "";
                        document.getElementById('edit-displayname').value = data.displayName || "";
                        originalUsername = data.username || "";
                        currentPhotoURL = data.photoURL || "";

                        // If they have a PFP (like from Google), display it
                        if (currentPhotoURL) {
                            document.getElementById('pfp-preview').style.backgroundImage = `url(${currentPhotoURL})`;
                            document.getElementById('pfp-icon').style.display = 'none';
                        }
                    }
                    hideLoading();
                } catch (error) {
                    console.error("Error fetching user data:", error);
                    showAlert("System Error", "Failed to load profile data.");
                }
            } else {
                // If not logged in, kick them back to login page
                window.location.replace('login.html');
            }
        });

        // --- SAVE LOGIC ---

        window.handleSaveProfile = async () => {
            if (!currentUser) return;

            const newUsername = document.getElementById('edit-username').value.trim().toLowerCase();
            const newDisplayName = document.getElementById('edit-displayname').value.trim();

            showLoading("Saving Profile...");

            try {
                // 1. Check Username Uniqueness (Only if they changed it)
                if (newUsername !== originalUsername) {
                    const usernameRef = doc(db, "usernames", newUsername);
                    const usernameSnap = await getDoc(usernameRef);
                    
                    if (usernameSnap.exists()) {
                        showAlert("Username Taken", "This username is already in use. Please choose another.");
                        return;
                    }
                }

                // 2. Handle Image Upload via ImgBB (Only if a new file was selected)
                let finalPhotoURL = currentPhotoURL;
                if (selectedPfpFile) {
                    showLoading("Uploading Image...");
                    const formData = new FormData();
                    formData.append("image", selectedPfpFile);
                    formData.append("key", IMGBB_API_KEY);

                    const response = await fetch("https://api.imgbb.com/1/upload", {
                        method: "POST",
                        body: formData
                    });
                    const imgData = await response.json();
                    
                    if (imgData.success) {
                        finalPhotoURL = imgData.data.url;
                    } else {
                        throw new Error("Failed to upload image to server.");
                    }
                }

                showLoading("Finalizing Setup...");

                // 3. Update User Document in Firestore
                const userDocRef = doc(db, "users", currentUser.uid);
                await setDoc(userDocRef, {
                    username: newUsername,
                    displayName: newDisplayName,
                    photoURL: finalPhotoURL,
                    profileCompleted: true
                }, { merge: true });

                // 4. Handle Username Document Swapping
                if (newUsername !== originalUsername) {
                    // Claim new username
                    await setDoc(doc(db, "usernames", newUsername), { uid: currentUser.uid });
                    
                    // Release old username (if they had one)
                    if (originalUsername) {
                        await deleteDoc(doc(db, "usernames", originalUsername));
                    }
                }

                // 5. Ensure System DB knows they are logged in
                await setDoc(doc(db, "file", "userData"), { isLoggedIn: true }, { merge: true });

                // 6. Redirect to Home
                window.location.replace('home.html');

            } catch (error) {
                console.error(error);
                showAlert("Update Failed", "An error occurred while saving your profile.");
            }
        };
    </script>
</body>
</html>
