<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Launch | Artist Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        electric: '#0052FF',
                        darkBg: '#000000',
                        darkSurface: '#0a0a0a'
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite'
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>

    <script>
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>

    <style>
        .layer-hidden { opacity: 0; pointer-events: none; transform: scale(0.97); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: absolute; }
        .layer-visible { opacity: 1; pointer-events: auto; transform: scale(1); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 10; }
        body { overflow: hidden; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 h-screen w-screen flex flex-col items-center justify-center transition-colors duration-300 relative">

    <div id="step-loading" class="layer-visible flex flex-col items-center justify-center">
        <div class="w-8 h-8 border-[3px] border-gray-200 dark:border-white/10 border-t-electric dark:border-t-white rounded-full animate-spin mb-5"></div>
        <p class="text-[10px] tracking-widest uppercase opacity-40 font-bold" id="loading-text">Connecting...</p>
    </div>

    <div id="step-theme" class="layer-hidden w-full max-w-sm px-6 flex flex-col items-center text-center">
        <h2 class="text-2xl font-bold mb-1 tracking-tight">Choose Your Vibe</h2>
        <p class="text-xs opacity-50 mb-10">You can change this later in settings.</p>

        <div class="grid grid-cols-3 gap-4 w-full">
            <button onclick="previewTheme('light')" class="flex flex-col items-center p-5 rounded-2xl bg-white dark:bg-darkSurface border border-gray-200 dark:border-white/5 hover:border-gray-300 dark:hover:border-white/20 transition-all active:scale-95">
                <svg class="w-7 h-7 mb-3 text-yellow-500 dark:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <span class="text-[11px] font-bold uppercase tracking-wider">Light</span>
            </button>
            <button onclick="previewTheme('dark')" class="flex flex-col items-center p-5 rounded-2xl bg-white dark:bg-darkSurface border border-gray-200 dark:border-white/5 hover:border-gray-300 dark:hover:border-white/20 transition-all active:scale-95">
                <svg class="w-7 h-7 mb-3 text-indigo-500 dark:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <span class="text-[11px] font-bold uppercase tracking-wider">Dark</span>
            </button>
            <button onclick="previewTheme('system')" class="flex flex-col items-center p-5 rounded-2xl bg-white dark:bg-darkSurface border border-gray-200 dark:border-white/5 hover:border-gray-300 dark:hover:border-white/20 transition-all active:scale-95">
                <svg class="w-7 h-7 mb-3 text-gray-500 dark:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span class="text-[11px] font-bold uppercase tracking-wider">System</span>
            </button>
        </div>
    </div>

    <div id="confirm-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md hidden items-center justify-center z-50 transition-opacity duration-300 opacity-0">
        <div id="confirm-card" class="bg-white dark:bg-darkSurface p-6 rounded-[20px] max-w-[280px] w-full mx-4 border border-gray-100 dark:border-white/10 transform scale-95 transition-transform duration-300 flex flex-col items-center text-center shadow-sm dark:shadow-none">
            <h3 class="text-lg font-bold mb-1 tracking-tight">Apply Theme?</h3>
            <p class="text-xs opacity-50 mb-6">You can change this anytime.</p>
            <div class="flex gap-2 w-full">
                <button onclick="cancelTheme()" class="flex-1 bg-gray-100 dark:bg-white/5 hover:bg-gray-200 dark:hover:bg-white/10 text-gray-800 dark:text-white text-sm font-bold py-3 px-4 rounded-xl transition-colors">Back</button>
                <button onclick="saveTheme()" class="flex-1 bg-electric dark:bg-white hover:opacity-90 text-white dark:text-black text-sm font-bold py-3 px-4 rounded-xl transition-opacity">Confirm</button>
            </div>
        </div>
    </div>

    <div id="step-permissions" class="layer-hidden w-full max-w-sm px-6 flex flex-col items-center text-center">
        <div class="w-16 h-16 bg-gray-100 dark:bg-white/5 rounded-full flex items-center justify-center mb-6">
            <svg class="w-7 h-7 text-electric dark:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
        </div>
        <h2 class="text-2xl font-bold mb-2 tracking-tight">Media Access</h2>
        <p class="text-sm opacity-50 mb-10 leading-relaxed">We need access to your device storage to allow you to upload custom content and save files locally.</p>
        
        <button onclick="completeOnboarding()" class="w-full bg-electric dark:bg-white hover:opacity-90 text-white dark:text-black text-sm font-bold py-4 px-4 rounded-xl transition-all active:scale-95 mb-2">Grant Permission</button>
        <button onclick="completeOnboarding()" class="w-full bg-transparent text-xs font-bold opacity-40 hover:opacity-100 py-3 transition-opacity uppercase tracking-wider">Not Right Now</button>
    </div>

    <div id="step-splash" class="layer-hidden flex flex-col items-center justify-center">
        <img src="logo.png" alt="Artist Hub Logo" class="w-24 h-24 object-contain animate-float transition-all duration-500 brightness-0 dark:invert" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23ffffff\'><path d=\'M12 2L2 22h20L12 2z\'/></svg>'">
    </div>

    <div id="system-error-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-[60] transition-opacity duration-300 opacity-0">
        <div id="system-error-card" class="bg-white dark:bg-darkSurface p-6 rounded-[20px] max-w-[280px] w-full mx-4 border border-gray-100 dark:border-white/10 transform scale-95 transition-transform duration-300 flex flex-col items-center text-center shadow-sm dark:shadow-none">
            <div class="w-12 h-12 bg-red-50 dark:bg-red-500/10 rounded-full flex items-center justify-center mb-4">
                <svg class="w-6 h-6 text-red-500 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <h3 class="text-lg font-bold mb-1 tracking-tight text-gray-900 dark:text-white">Connection Error</h3>
            <p id="system-error-message" class="text-xs text-gray-500 dark:text-gray-400 mb-6">Database connection failed. Check your rules.</p>
            <button onclick="closeSystemError()" class="w-full bg-gray-900 dark:bg-white hover:opacity-90 text-white dark:text-black text-sm font-bold py-3 px-4 rounded-xl transition-all">Retry</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCANvRaHEUA7wkWMhC9_hFyrzU8cjoUo2U",
            authDomain: "thuggish-2cd07.firebaseapp.com",
            projectId: "thuggish-2cd07",
            storageBucket: "thuggish-2cd07.firebasestorage.app",
            messagingSenderId: "221865053567",
            appId: "1:221865053567:web:ad8960c0136ac524269e4a",
            measurementId: "G-Z43YDNRL8P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const dbRef = doc(db, "file", "userData");

        let pendingTheme = null;
        let initialLoadIsDark = document.documentElement.classList.contains('dark');
        let databaseState = null;

        window.previewTheme = (mode) => {
            pendingTheme = mode;
            if (mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            showConfirmModal();
        };

        window.cancelTheme = () => {
            if (initialLoadIsDark) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            pendingTheme = null;
            hideConfirmModal();
        };

        window.saveTheme = async () => {
            const success = await writeToDatabase('theme_preference', pendingTheme);
            if (success) {
                initialLoadIsDark = document.documentElement.classList.contains('dark');
                hideConfirmModal();
                showLayer(document.getElementById('step-permissions'));
            } else {
                hideConfirmModal();
            }
        };

        window.completeOnboarding = async () => {
            const success = await writeToDatabase('app_setup_complete', true);
            if (success) {
                showLayer(document.getElementById('step-splash'));
                setTimeout(() => window.location.replace('login.html'), 1500);
            }
        };

        window.closeSystemError = () => {
            const modal = document.getElementById('system-error-modal');
            const card = document.getElementById('system-error-card');
            modal.classList.remove('opacity-100'); modal.classList.add('opacity-0');
            card.classList.remove('scale-100'); card.classList.add('scale-95');
            setTimeout(() => { modal.classList.remove('flex'); modal.classList.add('hidden'); initApp(); }, 300);
        };

        async function fetchDatabase() {
            try {
                const docSnap = await getDoc(dbRef);
                return docSnap.exists() ? docSnap.data() : {};
            } catch (error) {
                console.error("Firebase Read Error:", error);
                showSystemError("Failed to connect to database. Check your network.");
                return null;
            }
        }

        async function writeToDatabase(key, value) {
            try {
                await setDoc(dbRef, { [key]: value }, { merge: true });
                if (databaseState) databaseState[key] = value;
                return true; 
            } catch (error) {
                console.error("Firebase Write Error:", error);
                showSystemError("Cannot save data. Permission denied.");
                return false;
            }
        }

        function showLayer(layerElement) {
            document.querySelectorAll('.layer-visible').forEach(el => {
                el.classList.remove('layer-visible');
                el.classList.add('layer-hidden');
            });
            setTimeout(() => {
                layerElement.classList.remove('layer-hidden');
                layerElement.classList.add('layer-visible');
            }, 300);
        }

        function showConfirmModal() {
            const modal = document.getElementById('confirm-modal');
            const card = document.getElementById('confirm-card');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0'); modal.classList.add('opacity-100');
                card.classList.remove('scale-95'); card.classList.add('scale-100');
            });
        }

        function hideConfirmModal() {
            const modal = document.getElementById('confirm-modal');
            const card = document.getElementById('confirm-card');
            modal.classList.remove('opacity-100'); modal.classList.add('opacity-0');
            card.classList.remove('scale-100'); card.classList.add('scale-95');
            setTimeout(() => { modal.classList.remove('flex'); modal.classList.add('hidden'); }, 300);
        }

        function showSystemError(message) {
            document.getElementById('system-error-message').innerText = message;
            const modal = document.getElementById('system-error-modal');
            const card = document.getElementById('system-error-card');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0'); modal.classList.add('opacity-100');
                card.classList.remove('scale-95'); card.classList.add('scale-100');
            });
        }

        async function initApp() {
            showLayer(document.getElementById('step-loading'));
            databaseState = await fetchDatabase();
            if (!databaseState) return; 

            const dbTheme = databaseState.theme_preference;
            if (dbTheme === 'dark' || (dbTheme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                initialLoadIsDark = true;
            } else if (dbTheme === 'light') {
                document.documentElement.classList.remove('dark');
                initialLoadIsDark = false;
            }

            if (databaseState.app_setup_complete) {
                showLayer(document.getElementById('step-splash'));
                setTimeout(() => {
                    if (databaseState.isLoggedIn) window.location.replace('home.html');
                    else window.location.replace('login.html');
                }, 1500); 
            } else {
                showLayer(document.getElementById('step-theme'));
            }
        }

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
