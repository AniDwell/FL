<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Launch</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        electric: '#0052FF',
                        darkBg: '#000000',     /* Pure OLED Black */
                        darkSurface: '#0f0f0f' /* Deep grey for elevated cards */
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>

    <script>
        // We default to the system preference instantly to prevent blinding white flashes 
        // while we wait for the database file to load.
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>

    <style>
        /* Smooth transitions for all UI layer swaps */
        .layer-hidden { opacity: 0; pointer-events: none; transform: scale(0.95); transition: all 0.5s ease; position: absolute; }
        .layer-visible { opacity: 1; pointer-events: auto; transform: scale(1); transition: all 0.5s ease; position: relative; z-index: 10; }
        
        /* Hide scrollbars for native feel */
        body { overflow: hidden; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 h-screen w-screen flex flex-col items-center justify-center transition-colors duration-500 relative">

    <div class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-electric/20 dark:bg-electric/15 rounded-full blur-3xl animate-float pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-80 h-80 bg-blue-400/20 dark:bg-blue-900/20 rounded-full blur-3xl animate-float-delayed pointer-events-none"></div>

    <div id="step-loading" class="layer-visible flex flex-col items-center justify-center">
        <div class="w-8 h-8 border-2 border-gray-300 dark:border-gray-800 border-t-electric rounded-full animate-spin"></div>
    </div>

    <div id="step-theme" class="layer-hidden w-full max-w-sm px-6 flex flex-col items-center text-center">
        <h2 class="text-2xl font-bold mb-2">Choose Your Vibe</h2>
        <p class="text-sm opacity-60 mb-8">You can change this later in settings.</p>

        <div class="grid grid-cols-3 gap-4 w-full">
            <button onclick="previewTheme('light')" class="flex flex-col items-center p-4 rounded-2xl bg-white dark:bg-darkSurface border border-gray-200 dark:border-gray-800 shadow-sm hover:border-electric transition-colors active:scale-95">
                <svg class="w-8 h-8 mb-3 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <span class="text-xs font-semibold">Light</span>
            </button>
            <button onclick="previewTheme('dark')" class="flex flex-col items-center p-4 rounded-2xl bg-white dark:bg-darkSurface border border-gray-200 dark:border-gray-800 shadow-sm hover:border-electric transition-colors active:scale-95">
                <svg class="w-8 h-8 mb-3 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <span class="text-xs font-semibold">Dark</span>
            </button>
            <button onclick="previewTheme('system')" class="flex flex-col items-center p-4 rounded-2xl bg-white dark:bg-darkSurface border border-gray-200 dark:border-gray-800 shadow-sm hover:border-electric transition-colors active:scale-95">
                <svg class="w-8 h-8 mb-3 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span class="text-xs font-semibold">System</span>
            </button>
        </div>
    </div>

    <div id="confirm-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center z-50 transition-opacity duration-300 opacity-0">
        <div id="confirm-card" class="bg-white dark:bg-darkSurface p-6 rounded-2xl shadow-2xl max-w-[280px] w-full mx-4 border border-gray-200 dark:border-gray-800 transform scale-95 transition-transform duration-300 flex flex-col items-center text-center">
            <h3 class="text-xl font-bold mb-2">Look Good?</h3>
            <p class="text-sm opacity-60 mb-6">Confirm your theme preference.</p>
            <div class="flex gap-3 w-full">
                <button onclick="cancelTheme()" class="flex-1 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-800 dark:text-gray-200 font-semibold py-2.5 px-4 rounded-xl transition-colors">
                    Back
                </button>
                <button onclick="saveTheme()" class="flex-1 bg-electric hover:bg-blue-600 text-white font-semibold py-2.5 px-4 rounded-xl shadow-lg shadow-electric/25 transition-colors">
                    Confirm
                </button>
            </div>
        </div>
    </div>

    <div id="step-permissions" class="layer-hidden w-full max-w-sm px-6 flex flex-col items-center text-center">
        <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 rounded-full flex items-center justify-center mb-6">
            <svg class="w-8 h-8 text-electric" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
        </div>
        <h2 class="text-2xl font-bold mb-2">Media Access</h2>
        <p class="text-sm opacity-60 mb-8">We need access to your device storage to allow you to upload custom content and save files locally.</p>
        
        <button onclick="completeOnboarding()" class="w-full bg-electric hover:bg-blue-600 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-electric/25 transition-transform active:scale-95 mb-3">
            Grant Permission
        </button>
        <button onclick="completeOnboarding()" class="w-full bg-transparent text-sm font-medium opacity-60 hover:opacity-100 py-2 transition-opacity">
            Not Right Now
        </button>
    </div>

    <div id="step-splash" class="layer-hidden flex flex-col items-center justify-center">
        <img src="logo.png" alt="App Logo" class="w-28 h-28 object-contain animate-float drop-shadow-2xl" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%230052FF\'><path d=\'M12 2L2 22h20L12 2z\'/></svg>'">
    </div>

    <div id="system-error-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-[60] transition-opacity duration-300 opacity-0">
        <div id="system-error-card" class="bg-darkSurface p-6 rounded-2xl shadow-[0_0_40px_rgba(220,38,38,0.15)] max-w-[300px] w-full mx-4 border border-red-900/50 transform scale-95 transition-transform duration-300 flex flex-col items-center text-center">
            <div class="w-14 h-14 bg-red-500/10 rounded-full flex items-center justify-center mb-4">
                <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <h3 class="text-xl font-bold mb-2 text-white">System Error</h3>
            <p id="system-error-message" class="text-sm text-gray-400 mb-6">Database file is missing or inaccessible.</p>
            <button onclick="closeSystemError()" class="w-full bg-red-600 hover:bg-red-500 text-white font-semibold py-2.5 px-4 rounded-xl transition-colors">
                Retry Connection
            </button>
        </div>
    </div>

    <script>
        // DOM Elements
        const stepLoading = document.getElementById('step-loading');
        const stepTheme = document.getElementById('step-theme');
        const stepPermissions = document.getElementById('step-permissions');
        const stepSplash = document.getElementById('step-splash');
        
        // Modal Elements
        const confirmModal = document.getElementById('confirm-modal');
        const confirmCard = document.getElementById('confirm-card');
        const systemErrorModal = document.getElementById('system-error-modal');
        const systemErrorCard = document.getElementById('system-error-card');
        const systemErrorMessage = document.getElementById('system-error-message');

        // Global State
        let pendingTheme = null;
        let initialLoadIsDark = document.documentElement.classList.contains('dark');
        let databaseState = null; // Holds our fetched JSON data

        // --- DATABASE INTERFACE (No LocalStorage) ---
        
        // 1. Read from DB File
        async function fetchDatabase() {
            try {
                const response = await fetch('file.json');
                if (!response.ok) throw new Error("File missing or unreachable");
                return await response.json();
            } catch (error) {
                console.error("DB Error:", error);
                showSystemError("Database named 'file' does not exist or connection failed.");
                return null;
            }
        }

        // 2. Write to DB File (Mock backend API call)
        async function writeToDatabase(key, value) {
            // Since we cannot write directly to a local JSON file via front-end JS alone,
            // this function assumes you have a bridge/API endpoint set up in your actual app.
            // For now, we simulate a successful write if the file was reachable initially.
            
            if (databaseState === null) {
                showSystemError("Cannot save data. Database connection is offline.");
                return false;
            }

            // Simulate updating our local cache of the DB
            databaseState[key] = value;
            
            /* In your real app, you would do a POST request here:
               await fetch('api/update_file', { method: 'POST', body: JSON.stringify({[key]: value}) }) 
            */
            return true; 
        }

        // --- LAYER LOGIC ---
        function showLayer(layerElement) {
            document.querySelectorAll('.layer-visible').forEach(el => {
                el.classList.remove('layer-visible');
                el.classList.add('layer-hidden');
            });
            setTimeout(() => {
                layerElement.classList.remove('layer-hidden');
                layerElement.classList.add('layer-visible');
            }, 300);
        }

        // --- THEME & MODAL LOGIC ---
        function previewTheme(mode) {
            pendingTheme = mode;
            
            if (mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }

            confirmModal.classList.remove('hidden');
            confirmModal.classList.add('flex');
            requestAnimationFrame(() => {
                confirmModal.classList.remove('opacity-0');
                confirmModal.classList.add('opacity-100');
                confirmCard.classList.remove('scale-95');
                confirmCard.classList.add('scale-100');
            });
        }

        function cancelTheme() {
            if (initialLoadIsDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            pendingTheme = null;
            closeModal();
        }

        async function saveTheme() {
            // Ask database to save the theme
            const success = await writeToDatabase('theme_preference', pendingTheme);
            
            if (success) {
                initialLoadIsDark = document.documentElement.classList.contains('dark');
                closeModal();
                showLayer(stepPermissions);
            } else {
                closeModal(); 
            }
        }

        function closeModal() {
            confirmModal.classList.remove('opacity-100');
            confirmModal.classList.add('opacity-0');
            confirmCard.classList.remove('scale-100');
            confirmCard.classList.add('scale-95');
            setTimeout(() => {
                confirmModal.classList.remove('flex');
                confirmModal.classList.add('hidden');
            }, 300); 
        }

        // --- SYSTEM ERROR LOGIC ---
        function showSystemError(message) {
            systemErrorMessage.innerText = message;
            systemErrorModal.classList.remove('hidden');
            systemErrorModal.classList.add('flex');
            requestAnimationFrame(() => {
                systemErrorModal.classList.remove('opacity-0');
                systemErrorModal.classList.add('opacity-100');
                systemErrorCard.classList.remove('scale-95');
                systemErrorCard.classList.add('scale-100');
            });
        }

        function closeSystemError() {
            systemErrorModal.classList.remove('opacity-100');
            systemErrorModal.classList.add('opacity-0');
            systemErrorCard.classList.remove('scale-100');
            systemErrorCard.classList.add('scale-95');
            setTimeout(() => {
                systemErrorModal.classList.remove('flex');
                systemErrorModal.classList.add('hidden');
                // Auto-retry fetching the DB when they close the error
                initApp(); 
            }, 300);
        }

        // --- ROUTING LOGIC ---
        async function completeOnboarding() {
            // Ask database to save setup completion
            const success = await writeToDatabase('app_setup_complete', true);
            
            if (success) {
                showLayer(stepSplash);
                setTimeout(() => {
                    window.location.replace('login.html');
                }, 2000);
            }
        }

        // --- INITIALIZATION ---
        async function initApp() {
            showLayer(stepLoading); // Show spinner while fetching DB

            databaseState = await fetchDatabase();

            if (!databaseState) {
                // Fetch failed, error modal is already triggered by fetchDatabase()
                return;
            }

            // Sync theme from Database immediately
            const dbTheme = databaseState.theme_preference;
            if (dbTheme === 'dark' || (dbTheme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                initialLoadIsDark = true;
            } else if (dbTheme === 'light') {
                document.documentElement.classList.remove('dark');
                initialLoadIsDark = false;
            }

            // Route based on Database state
            if (databaseState.app_setup_complete) {
                showLayer(stepSplash);
                setTimeout(() => {
                    if (databaseState.isLoggedIn) {
                        window.location.replace('home.html');
                    } else {
                        window.location.replace('login.html');
                    }
                }, 2000); // 2 seconds of cinematic splash screen
            } else {
                showLayer(stepTheme);
            }
        }

        // Kick off as soon as DOM is ready
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
