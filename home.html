<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Home | Artist Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        electric: '#0052FF',
                        darkBg: '#000000',
                        darkSurface: '#0a0a0a'
                    }
                }
            }
        }
    </script>

    <script>
        const theme = localStorage.getItem('theme_preference') || 'system';
        if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>

    <style>
        body { overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        /* Hide scrollbar for a clean app feel */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 min-h-screen w-screen flex flex-col transition-colors duration-300">

    <header class="sticky top-0 z-50 bg-white/90 dark:bg-black/90 backdrop-blur-md border-b border-gray-200 dark:border-white/10 px-4 py-3 flex justify-between items-center">
        
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
            <img src="logo.png" alt="Logo" class="w-8 h-8 object-contain brightness-0 dark:invert" onerror="this.style.display='none'">
            <h1 class="text-xl font-extrabold tracking-tight">Artist Hub</h1>
        </div>

        <div class="flex items-center gap-4">
            <a href="notify.html" class="relative group">
                <svg class="w-6 h-6 text-gray-800 dark:text-white transition-transform group-active:scale-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                <span class="absolute top-0 right-0 w-2.5 h-2.5 bg-red-500 border-2 border-white dark:border-black rounded-full"></span>
            </a>
            
            <a href="cht.html" class="relative group">
                <svg class="w-6 h-6 text-gray-800 dark:text-white transition-transform group-active:scale-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
            </a>
        </div>
    </header>

    <main class="flex-1 w-full max-w-lg mx-auto pb-20 flex flex-col gap-4 pt-4">
        
        <div id="stories-widget" class="w-full"></div>
        <div id="feed1-widget" class="w-full"></div>
        <div id="vidz-widget" class="w-full"></div>
        <div id="feed2-widget" class="w-full"></div>
        <div id="sugess-widget" class="w-full"></div>
        <div id="feed3-widget" class="w-full"></div>
        <div id="vidzbf-widget" class="w-full"></div>
        <div id="feed4-widget" class="w-full"></div>

    </main>

    <script type="module">
        // List of all widgets and their respective files
        const widgetConfig = [
            { id: 'stories-widget', file: './stories.js', func: 'loadStories' },
            { id: 'feed1-widget', file: './feed1.js', func: 'loadFeed1' },
            { id: 'vidz-widget', file: './vidz.js', func: 'loadVidz' },
            { id: 'feed2-widget', file: './feed2.js', func: 'loadFeed2' },
            { id: 'sugess-widget', file: './sugess.js', func: 'loadSugess' },
            { id: 'feed3-widget', file: './feed3.js', func: 'loadFeed3' },
            { id: 'vidzbf-widget', file: './vidzbf.js', func: 'loadVidzbf' },
            { id: 'feed4-widget', file: './feed4.js', func: 'loadFeed4' }
        ];

        // Function to create a placeholder skeleton if file is missing
        const createPlaceholder = (id, filename) => {
            const container = document.getElementById(id);
            container.innerHTML = `
                <div class="mx-4 my-2 p-6 border border-dashed border-gray-300 dark:border-white/10 rounded-2xl flex flex-col items-center justify-center bg-gray-50 dark:bg-darkSurface opacity-50">
                    <div class="w-6 h-6 border-2 border-gray-300 dark:border-gray-600 border-t-electric rounded-full animate-spin mb-2"></div>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Awaiting ${filename}</span>
                </div>
            `;
        };

        // Dynamically load all widgets
        async function loadWidgets() {
            for (const widget of widgetConfig) {
                try {
                    // Try to import the file dynamically
                    const module = await import(widget.file);
                    // Execute its load function
                    if (module && module[widget.func]) {
                        module[widget.func](widget.id);
                    }
                } catch (error) {
                    // If file doesn't exist yet, show a placeholder box
                    console.warn(`Widget missing or error in ${widget.file}:`, error);
                    createPlaceholder(widget.id, widget.file);
                }
            }
        }

        // Initialize when DOM is ready
        window.addEventListener('DOMContentLoaded', loadWidgets);
    </script>
</body>
</html>
